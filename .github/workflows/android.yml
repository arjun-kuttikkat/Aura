name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-36 build-tools;35.0.0"
          accept-android-sdk-licenses: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TREASURY_WALLET: ${{ secrets.TREASURY_WALLET }}
          RELEASE_AUTHORITY_PUBKEY: ${{ secrets.RELEASE_AUTHORITY_PUBKEY }}
          SOLANA_AUTHORITY_KEY: ${{ secrets.SOLANA_AUTHORITY_KEY }}
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "SUPABASE_URL=${SUPABASE_URL:-https://placeholder.supabase.co}"
            echo "SUPABASE_KEY=${SUPABASE_KEY:-placeholder-anon-key}"
            echo "HELIUS_API_KEY=${HELIUS_API_KEY:-placeholder}"
            echo "HELIUS_RPC_URL=https://mainnet.helius-rpc.com/?api-key=${HELIUS_API_KEY:-placeholder}"
            echo "GROQ_API_KEY=${GROQ_API_KEY:-placeholder}"
            echo "GROQ_MODEL=meta-llama/llama-4-scout-17b-16e-instruct"
            echo "TREASURY_WALLET=${TREASURY_WALLET:-placeholder}"
            echo "RELEASE_AUTHORITY_PUBKEY=${RELEASE_AUTHORITY_PUBKEY:-${SOLANA_AUTHORITY_KEY:-placeholder}}"
            echo "CEREBRAS_API_KEY="
            echo "MAPS_API_KEY=PLACEHOLDER_KEY"
            echo "SUPABASE_JWT_SECRET="
          } > local.properties

      - name: Clean and Build with Gradle
        env:
          GRADLE_OPTS: -Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Lint check
        run: ./gradlew lintDebug --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/
        continue-on-error: true

      - name: Build release APK
        if: github.ref == 'refs/heads/main'
        env:
          GRADLE_OPTS: -Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
